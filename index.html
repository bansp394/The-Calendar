  <script>
    // ─── PARTICLE SYSTEM ───────────────────────────────────────
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');

    let W, H, particles;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function createParticles(count) {
      return Array.from({ length: count }, () => ({
        x:       Math.random() * W,
        y:       Math.random() * H,
        r:       Math.random() * 1.2 + 0.3,       // radius 0.3–1.5px
        alpha:   Math.random() * 0.5 + 0.1,        // opacity 0.1–0.6
        speed:   Math.random() * 0.12 + 0.03,      // drift speed
        angle:   Math.random() * Math.PI * 2,      // drift direction
        twinkle: Math.random() * 0.008 + 0.002,    // fade pulse speed
        tDir:    Math.random() > 0.5 ? 1 : -1,     // twinkle direction
      }));
    }

    function tick() {
      ctx.clearRect(0, 0, W, H);

      for (const p of particles) {
        // drift
        p.x += Math.cos(p.angle) * p.speed;
        p.y += Math.sin(p.angle) * p.speed;

        // wrap edges
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;

        // twinkle
        p.alpha += p.twinkle * p.tDir;
        if (p.alpha > 0.65 || p.alpha < 0.05) p.tDir *= -1;

        // draw
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 252, 240, ${p.alpha})`;
        ctx.fill();
      }

      requestAnimationFrame(tick);
    }

    resize();
    particles = createParticles(130);
    tick();

    window.addEventListener('resize', () => {
      resize();
      particles = createParticles(130);
    });
  </script>
